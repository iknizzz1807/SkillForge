services:
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./ai:/app
    networks:
      - app-network
    environment:
      - NODE_ENV=production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    depends_on:
      - mongodb
    networks:
      - app-network
    environment:
      - MONGO_URI=mongodb://mongodb:27017/skillforge
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-change-in-production}
      - AI_URL=http://ai:5000
      - JWT_EXPIRY_HOURS=24

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      # - /app/node_modules  # removed to allow package updates; rebuild with --build frontend
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NODE_ENV=development

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
